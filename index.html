<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/80f1a599ce.js" crossorigin="anonymous"></script>
    <title>Emmanuel Corral</title>
</head>
<body>
    <section id="landing-page">
        <nav>
            <figure>
                <img id="personal-logo" src="asset/logo-version-3.png" alt="EC Logo">
            </figure>
            <ul class="nav__link--list">
                <li class="nav__link">
                  <a href="#" class="nav__link--anchor
                    link__hover-effect
                    link__hover-effect--black">About</a>
                </li>
                <li class="nav__link">
                  <a href="#" class="nav__link--anchor
                    link__hover-effect
                    link__hover-effect--black">Projects</a>
                </li>
                <li class="nav__link">
                  <a href="#" class="nav__link--anchor
                    link__hover-effect
                    link__hover-effect--black">Contact</a>
                </li>
                <li class="nav__link click">
                  <a href="#" class="nav__link--anchor
                    link__hover-effect
                    link__hover-effect--black"><i class="fa-solid fa-circle-half-stroke"></i></a>
                </li>
            </ul>
        </nav>
        <header class="header">
          <div class="header__content">
            <h1 class="title">Hey</h1>
            <h1 class="title title--secondary">I'm Emmanuel.</h1>
            <p class="header__para">I'm a <b class="royal-blue">Frontend Software Engineer</b> with a strong passion in developing 
                interactive websites and applications that cater to have 
                a <b class="crimson">positive</b> and <b class="crimson">easy</b> user experience.<br>Here's a little bit 
                <b class="royal-blue">about me.</b>
            </p>
            <div class="social__list">
                <a href="" class=" social__link click">
                   <i class="fa-brands fa-square-github"></i> 
                </a>
                <a href="" class=" social__link click">
                   <i class="fa-solid fa-file-pdf"></i> 
                </a>
            </div>
          </div>
        </header>
        <button class="mail__btn click">
            <i class="fa-solid fa-envelope"></i>
        </button>
        <a href="#projects" class="scroll">
            <div class="scroll__icon click"></div>
        </a>
    </section>
    <section id="projects">
        <div class="container">
            <div class="row">
                <h1 class="section__title">
                    Here are some of my <span class="royal-blue">projects.</span>
                </h1>
                <ul class="project__list">
                    <li class="project">

                    </li>
                </ul>
            </div>
        </div>
    </section>
</body>
</html>
